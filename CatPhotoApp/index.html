<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link rel="stylesheet" href="/CatPhotoApp/style.css">
    <!--Font-->
    <link rel="stylesheet" href="/CatPhotoApp/font/font.css">
    <!--Favicon-->
    <link rel="shortcut icon" href="/CatPhotoApp/svg/cat_svg.svg" type="image/x-icon">
    <title>CatPhotoApp</title>
</head>
<body>
    <!--Main Start-->
    <main>
        <h1>CatPhotoApp</h1>
        <!--First Section-->
        <section>
            <h2>Cat Photos</h2>
            <!--TODO: add link cat photos-->
            <p>See more <a href="https://freecatphotoapp.com" target="_blank">cat photos </a>in our gallery</p>
            <a href="https://freecatphotoapp.com"><img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg" alt="A cute orange cat lying on its back."></a>
        </section>

        <!--Second Section Start-->
        <section>
            <h2>Cat lists</h2>
            <h3>Things cats love:</h3>
            <ul>
                <li>Cat nip</li>
                <li>Laser pointer</li>
                <li>Lasagna</li>
            </ul>
            <figure> <!-- element to mark up a photo in a document-->
                <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg" alt="A slice of lasagna on a plate.">
                <figcaption>Cat <em>love</em> lasagna</figcaption> <!--element to define a caption for the photo-->
            </figure>
            <h3>Top 3 things cats hate:</h3>
            <ol>
                <li>Flea treatment</li>
                <li>Thunder</li>
                <li>Other cats</li>
            </ol>
            <figure>
                <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" alt="Five cats looking around a field.">
                <figcaption>Cat <strong>hate</strong> other cats.</figcaption>
            </figure>
        </section>
        <!--Second Section End-->

        <!--Third Section Start-->
        <section>
            <h2>Cat Form</h2>
            <form action="https://freecatphotoapp.com/submit-cat-photo"></form>
            <!--First fieldset start-->
            <fieldset>
                <legend>Is your cats an indoor or outdoor cat?</legend>
                <label><input type="radio" name="indoor-outdoor" id="indoor" checked>Indoor</label>
                <label><input type="radio" name="indoor-outdoor" id="outdoor">Outdoor</label>
            </fieldset>
            <!--First fieldset End-->

            <!--Second fieldset Start-->
            <fieldset>
                <legend>What's your cat personality ?</legend>
                <input type="checkbox" id="loving" name="personality" value="loving" checked> <label for="loving">Loving</label>
                <input type="checkbox" id="lazy" name="personality" value="lazy"> <label for="lazy">Lazy</label>
                <input type="checkbox" id="enegertic" name="personality" value="enegertic"> <label for="enegertic">Energetic</label>
            </fieldset>
            <input type="text" name="catphotourl" placeholder="Cat Photo URL" required>
            <button type="submit">Submit</button>
            <!--Second fieldset End-->
        </section>
        <!--Third Section End-->
        
    </main>
    <!--Main End-->

    <!--Footer Start-->
    <footer>

    </footer>
    <!--Footer End-->
</body>
</html>
