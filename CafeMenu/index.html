<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link rel="stylesheet" href="/CafeMenu/style.css">
    <!--Font-->
    <link rel="stylesheet" href="/CafeMenu/font/font.css">
    <!--Favicon-->
    <link rel="shortcut icon" href="/CafeMenu/svg/cafe_svg.svg" type="image/x-icon">
    <title>Cafe Menu</title>
</head>
<body>
    <!--Div Start-->
    <div class="menu">
        <!--Main Start-->
        <main>
            <h1>CAMPER CAFE</h1>
            <p class="established">Est. 2020</p>
            <hr>
            <!--First Section Start-->
            <section>
                <h2>Coffee</h2>
                <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon">
                <article class="item">
                    <p class="flavor">French Vanilla</p><p class="price">3.00</p>
                </article>
                <article class="item">
                    <p class="flavor">Caramel Macchiato</p><p class="price">3.75</p>
                </article>
                <article class="item">
                    <p class="flavor">Pumpkin Spice</p><p class="price">3.50</p>
                </article>
                <article class="item">
                    <p class="flavor">Hazelnut</p><p class="price">4.00</p>
                </article>
                <article class="item">
                    <p class="flavor">Mocha</p><p class="price">4.50</p>
                </article>
            </section>
            <!--First Section End-->

            <!--Second Section Start-->
            <h2>Desserts</h2>
            <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon">
            <article class="item">
                <p class="dessert">Donut</p><p class="price">1.50</p>
            </article>
            <article class="item">
                <p class="dessert">Cherry Pie</p><p class="price">2.75</p>
            </article>
            <article class="item">
                <p class="dessert">Cheesecake</p><p class="price">3.00</p>
            </article>
            <article class="item">
                <p class="dessert">Cinnamon Roll</p><p class="price">2.50</p>
            </article>
            <!--Second Section End-->
        </main>
        <!--Main End-->
        <hr class="bottom-line">

        <!--Footer Start-->
        <p>
            <a href="" target="_blank">Visit our website</a>
        </p>
        <p class="address">123 Free Code Camp Drive</p>
        <!--Footer End-->
    </div>
    <!--Div End-->
</body>
</html>
