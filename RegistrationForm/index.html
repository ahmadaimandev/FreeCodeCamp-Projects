<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/RegistrationForm/style.css">
    <link rel="stylesheet" href="/RegistrationForm/font.css">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>
    <!--Form Start-->
    <form method="post" action="https://register-demo.freecodecamp.org">
        <!--First Fieldset Start-->
        <fieldset>
            <label for="first-name">Firsname: <input type="text" id="first-name" name="first-name" required></label>
            <label for="last-name">Lastname: <input type="text" id="last-name" name="last-name" required></label>
            <label for="new-email">Email: <input type="email" id="new-email" name="new-email" required></label>
            <label for="new-password">Create new password: <input type="new-password" id="new-password" name="new-password" pattern="[a-z0-5]{8,}" required></label>
        </fieldset>
        <!--First Fieldset End-->
        
        <!--Second Fieldset Start-->
        <fieldset>
            <legend>Account type (Required)</legend>
            <label for=""><input type="radio" id="personal" name="account-type" class="inline" checked> Personal Account</label>
            <label for=""><input type="radio" id="Business" name="account-type" class="inline"> Business Account</label>
        </fieldset>
        <!--Second Fieldset End-->
        
        <!--Third Fieldset Start-->
        <fieldset>
            <label for="">Upload your profile picture: <input type="file" name="profile-picture" id="profile-picture"</label>
            <label for="">Your age: <input type="number" id="age" name="age" min="18" max="120"></label>
            <label for="referrer">How did you hear about us?
                <select name="referrer" id="referrer">
                    <option value="">(Select One)</option>
                    <option value="1">Website</option>
                    <option value="2">Youtube</option>
                    <option value="3">Tiktok</option>
                    <option value="4">Instagram</option>
                    <option value="5">Facebook</option>
                </select>
            </label>
            <label for="bio">Provide your bio: 
                <textarea name="bio" id="bio" cols="30" rows="3" placeholder="I like coding in the beach while drink coffee"></textarea>
            </label>
        </fieldset>
        <!--Third Fieldset Start-->

        <label for="terms-and-conditions">
            <input class="inline" type="checkbox" name="terms-and-conditions" required>I Accept The <a href="https://www.freecodecamp.org/news/terms-of-service/">
                Terms and Condition
            </a>
        </label>
        <input type="submit" value="submit">
    </form>
    <!--Form End-->
</body>
</html>
